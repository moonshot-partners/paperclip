# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
#
# Requires .env file with BETTER_AUTH_SECRET and POSTGRES_PASSWORD.
# Port security relies on ufw (only 22/80/443 open externally).

services:
  db:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    restart: unless-stopped

  server:
    environment:
      DATABASE_URL: postgres://paperclip:${POSTGRES_PASSWORD}@db:5432/paperclip
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "https://paperclip.tennismafia.co.uk"
      PAPERCLIP_MIGRATION_AUTO_APPLY: "true"
      PAPERCLIP_MIGRATION_PROMPT: "never"
      PAPERCLIP_AUTH_DISABLE_SIGN_UP: "true"
    restart: unless-stopped
